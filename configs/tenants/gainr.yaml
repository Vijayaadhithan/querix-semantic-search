company:
  id: gainr
  planner_adapter: gainr

planner:
  enabled: true
  prompt_context: >-
    Gainr is a rental advertisement marketplace. Results can represent
    products, equipment, properties, vehicles, or services. Preserve the
    searcher's perspective: a person who wants to rent or hire an available
    listing needs offer ads; a supplier searching for people who need their
    item or service needs wanted ads.

retrieval:
  # After strong semantic matches, fill later pages only from a category or
  # subcategory explicitly resolved from the query/frontend filters.
  semantic_related_tail_enabled: true
  semantic_related_tail_requires_explicit_category: true
  # Keep results scoring at least 30% of the strongest result. The relative
  # floor also works when Gainr changes reranker providers.
  reranker_relative_score_floor: 0.30
  # Jina uses positive relevance scores. If every candidate is below this
  # floor, return no semantic matches instead of noise.
  reranker_min_score_by_provider:
    jina: 0.05

api:
  endpoint_slug: gainr
  key_envs:
    - GAINR_API_KEY

database:
  backend: mysql
  host_env: MYSQL_HOST
  port_env: MYSQL_PORT
  database_env: MYSQL_DATABASE
  user_env: MYSQL_USER
  password_env: MYSQL_PASSWORD
  search_ready_table: ads_search_ready
  content_column: embedding_content
  bm25_column: bm25_content
  search_id_column: id
  result_table: ads
  result_id_column: id
  result_type_column: type
  timeouts:
    connect_seconds: 10
    read_seconds: 300
    write_seconds: 300
    statement_timeout_ms: 0
  pool:
    min_size: 0
    max_size: 2
    timeout_seconds: 5
  # Local testing uses plaintext loopback. Production must use verify-full
  # with a CA path supplied through ca_file_env.
  tls:
    mode: disable
    ca_file_env: GAINR_DB_TLS_CA_FILE
    cert_file_env: GAINR_DB_TLS_CERT_FILE
    key_file_env: GAINR_DB_TLS_KEY_FILE

storage:
  vector_backend: chroma
  chroma_dir: storage/companies/gainr/chroma
  collection_name: company_gainr
  bm25_path: storage/companies/gainr/bm25.sqlite3

payload:
  request_mapping:
    query: query
    cursor: cursor
    page_size: page_size
  public_fields:
    - result_tier
    - id
    - type
    - category_type
    - parent_id
    - category_id
    - title
    - slug
    - description
    - rental_duration
    - rental_fee
    - is_rent_negotiable
    - city_id
    - locality_id
    - custom_locality
    - photos
    - total_favorite
    - total_like
    - users_rating_count
    - rating_avg
    - created_at
    - updated_at
  field_mapping: {}
  filter_schema:
    main_category_name: keyword
    subcategory_name: keyword
    state_name: keyword
    city_name: keyword
    locality_name: keyword
    rental_duration: keyword
    rental_fee: number

rate_limit:
  requests_per_minute: 120
  burst: 20

# Gainr's current frontend calls these legacy paths under /api/v1/gainr:
# search-suggestions, filter-data, filter-result, and recent-search.
# This adapter is deliberately enabled only for Gainr; other tenants keep the
# generic configurable /search contract.
compatibility:
  adapter: gainr_legacy
  users_table: users
  page_size: 20
  # Rerank the first two frontend pages. The remaining semantic result window
  # is filled by the filtered catalogue tail for infinite scrolling.
  semantic_ranked_window: 40
  suggestions_limit: 8
  recent_limit: 10
  recent_ttl_seconds: 7776000
  # Change only these two values if the production Network request uses
  # different price-range keys.
  min_fee_field: min_fee
  max_fee_field: max_fee
  # Gainr UI contract: 1 = Fixed and 0 = Negotiable. These are translated to
  # ads.is_rent_negotiable values 0 and 1 respectively.
  fixed_fee_id: 1
  negotiable_fee_id: 0
  # Keep internal routing and usage detail in server logs, not in Gainr's
  # legacy frontend response contract.
  emit_search_meta: false
  image_path: https://gainr.in/uploads/post/
