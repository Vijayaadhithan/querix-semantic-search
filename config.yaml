app_name: Local Data Assistant
collection_name: local_data
#gemma3:1b
ollama:
  # Keep query and embedding models resident until Ollama is stopped. This
  # removes cold model loading from requests after API startup.
  keep_alive: -1

llm:
  model: gemma4:12b
  temperature: 0.2
  think: false

query_extraction:
  model: gemma4:12b
  temperature: 0

embedding:
  model: embeddinggemma:latest
  similarity: cosine
  normalize: true

chunking:
  chunk_size: 512
  chunk_overlap: 80

retrieval:
  vector_candidate_k: 100
  vector_top_k: 30
  bm25_top_k: 30
  hybrid_candidate_k: 60
  # Scroll searches over-fetch each retrieval source before reranking. This
  # prevents top-K from becoming a hard end-of-results cutoff.
  overfetch_factor: 2
  rrf_constant: 60
  vector_weight: 1.0
  bm25_weight: 1.0
  # Category-only candidates fill later pages but start below semantic and
  # keyword matches in the fusion stage.
  category_fallback_weight: 0.25
  soft_category_boost: 0.005
  final_top_k: 10
  reranker_model: Alibaba-NLP/gte-reranker-modernbert-base
  reranker_batch_size: 4
  reranker_max_length: 512
  reranker_use_fp16: false

api:
  host: 127.0.0.1
  port: 8000
  # Load the reranker once when the API process starts. Requests reuse the
  # same in-memory model and do not pay model-loading latency.
  preload_reranker: true
  # Normal product-grid and infinite-scroll batch size.
  default_page_size: 20
  max_page_size: 20
  preload_ollama: true
  # The first request ranks this many results once. Later cursor requests
  # return slices from that stable result window.
  max_results: 60
  session_ttl_seconds: 600
  max_sessions: 500
