app_name: Local Data Assistant
collection_name: local_data
ollama:
  # Keep the embedding model resident until Ollama is stopped.
  keep_alive: -1

query_extraction:
  # Try the next model only when the current model is rate-limited or
  # temporarily unavailable.
  models:
    - gemma-4-26b-a4b-it
    - gemma-4-31b-it
    - gemini-3.1-flash-lite
  temperature: 0

embedding:
  model: embeddinggemma:latest
  similarity: cosine
  normalize: true

chunking:
  chunk_size: 512
  chunk_overlap: 80

retrieval:
  vector_candidate_k: 100
  vector_top_k: 30
  bm25_top_k: 30
  hybrid_candidate_k: 60
  # Rerank the 60 strongest fused candidates.
  rerank_candidate_k: 60
  primary_ranked_k: 60
  related_tail_enabled: true
  # Scroll searches over-fetch each retrieval source before reranking. This
  # prevents top-K from becoming a hard end-of-results cutoff.
  overfetch_factor: 2
  rrf_constant: 60
  vector_weight: 1.0
  bm25_weight: 1.0
  soft_category_boost: 0.005
  final_top_k: 10
  reranker_model: Alibaba-NLP/gte-reranker-modernbert-base
  reranker_batch_size: 4
  reranker_max_length: 512
  reranker_use_fp16: false

api:
  host: 127.0.0.1
  port: 8000
  # Use debug for library-level diagnostics; info shows the search flow.
  log_level: info
  # Load the reranker once when the API process starts. Requests reuse the
  # same in-memory model and do not pay model-loading latency.
  preload_reranker: true
  # Normal product-grid and infinite-scroll batch size.
  default_page_size: 20
  max_page_size: 20
  preload_embedding: true
  # Combined cached window: 60 reranked results plus up to 140 related rows.
  max_results: 200
  session_ttl_seconds: 600
  max_sessions: 500
