app_name: Local Data Assistant
ollama:
  # Keep the embedding model resident until Ollama is stopped.
  keep_alive: -1

query_extraction:
  # Try the next model only when the current model is rate-limited or
  # temporarily unavailable.
  # Prefix Groq model IDs with `groq:` when enabling that provider, for example
  # `groq:openai/gpt-oss-20b`. Keep Gemini first until the Groq key and Gainr
  # planner evaluation have both passed.
  models:
    - gemini-3.1-flash-lite
    - gemma-4-26b-a4b-it
    - gemma-4-31b-it
  temperature: 0
  # Per-model deadline. Timeouts advance to the next configured model.
  timeout_seconds: 10
  deterministic_fast_path: true
  fuzzy_matching: true
  cache_size: 500
  cache_ttl_seconds: 3600

redis:
  # Redis shares query plans across API workers and survives API restarts.
  # Search automatically falls back to its bounded in-process cache.
  enabled: true
  key_prefix: semantic_ads
  # Cache only ordered IDs and ranking metadata; MySQL rows remain fresh.
  result_cache_enabled: true
  result_cache_ttl_seconds: 300

embedding:
  model: embeddinggemma:latest
  similarity: cosine
  normalize: true

retrieval:
  # Source rows commonly use 0 or 1 as "price not supplied". Such rows remain
  # searchable but rank after every genuine price in price-sorted searches.
  unpriced_rental_fee_ceiling: 1
  vector_candidate_k: 100
  # A bounded post-filter window can avoid expensive complex metadata
  # predicates while preserving exact checks in the retrieval layer.
  vector_post_filter_overfetch_factor: 10
  vector_post_filter_max_candidates: 2000
  vector_top_k: 30
  bm25_top_k: 30
  # Recall pool used before the smaller hosted reranker payload is selected.
  # With overfetch_factor=2, paged semantic searches inspect up to 80 results
  # from each retrieval source while sending only 20 candidates to the API.
  hybrid_candidate_k: 40
  # Keep one complete 20-result page inside the hosted semantic ranking window.
  rerank_candidate_k: 20
  primary_ranked_k: 20
  related_tail_enabled: true
  # Scroll searches over-fetch each retrieval source before reranking. This
  # prevents top-K from becoming a hard end-of-results cutoff.
  overfetch_factor: 2
  rrf_constant: 60
  vector_weight: 1.0
  bm25_weight: 1.0
  soft_category_boost: 0.005
  final_top_k: 10
  reranker_model: hosted-reranker-chain
  reranker_providers:
    # Try the higher-quality Voyage model first and its lite model second.
    order:
      - voyage-2.5
      - voyage-2.5-lite
    timeout_seconds: 3
    # Bounds provider tokens/cost while retaining titles and strongest fields.
    max_document_chars: 300
    voyage_model: rerank-2.5
    voyage_lite_model: rerank-2.5-lite
    voyage_requests_per_minute_per_model: 3

api:
  host: 127.0.0.1
  port: 8000
  # Production must set API_AUTH_ENABLED=true and configure tenant API keys.
  auth_enabled: false
  rate_limit_enabled: true
  tenant_config_dir: configs/tenants
  # Conservative defaults for a one-company 8 GB deployment.
  tenant_engine_cache_size: 1
  tenant_max_concurrent_searches: 1
  # Reject excess work after a short bounded wait instead of building an
  # unbounded in-process queue on the 8 GB host.
  search_slot_timeout_seconds: 5
  # Use debug for library-level diagnostics; info shows the search flow.
  log_level: info
  # Validate and share the hosted provider chain when the API starts.
  preload_reranker: true
  # Normal product-grid and infinite-scroll batch size.
  default_page_size: 20
  max_page_size: 20
  preload_embedding: true
  # Combined cached window: 20 reranked results, the remaining fused hybrid
  # matches, and finally related catalogue rows.
  max_results: 200
  session_ttl_seconds: 600
  max_sessions: 500
  usage_tracking_enabled: true
  usage_db_path: storage/usage.sqlite3
