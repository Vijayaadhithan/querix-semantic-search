app_name: Local Data Assistant
collection_name: local_data
ollama:
  # Keep the embedding model resident until Ollama is stopped.
  keep_alive: -1

query_extraction:
  # Try the next model only when the current model is rate-limited or
  # temporarily unavailable.
  models:
    - gemini-3.1-flash-lite
    - gemma-4-26b-a4b-it
    - gemma-4-31b-it
  temperature: 0
  # Per-model deadline. Timeouts advance to the next configured model.
  timeout_seconds: 10
  deterministic_fast_path: true
  fuzzy_matching: true
  cache_size: 500
  cache_ttl_seconds: 900

redis:
  # Redis shares query plans across API workers and survives API restarts.
  # Search automatically falls back to its bounded in-process cache.
  enabled: true
  key_prefix: semantic_ads
  # Cache only ordered IDs and ranking metadata; MySQL rows remain fresh.
  result_cache_enabled: true
  result_cache_ttl_seconds: 300

embedding:
  model: embeddinggemma:latest
  similarity: cosine
  normalize: true

chunking:
  chunk_size: 512
  chunk_overlap: 80

retrieval:
  # Source rows commonly use 0 or 1 as "price not supplied". Such rows remain
  # searchable but rank after every genuine price in price-sorted searches.
  unpriced_rental_fee_ceiling: 1
  vector_candidate_k: 100
  # Chroma's metadata-filtered HNSW path is very slow on the 250k-row Gainr
  # collection. Retrieve a bounded unfiltered window and enforce the same
  # metadata constraints in memory.
  vector_post_filter_overfetch_factor: 10
  vector_post_filter_max_candidates: 2000
  vector_top_k: 30
  bm25_top_k: 30
  hybrid_candidate_k: 60
  # Rerank the 60 strongest fused candidates.
  rerank_candidate_k: 60
  primary_ranked_k: 60
  related_tail_enabled: true
  # Scroll searches over-fetch each retrieval source before reranking. This
  # prevents top-K from becoming a hard end-of-results cutoff.
  overfetch_factor: 2
  rrf_constant: 60
  vector_weight: 1.0
  bm25_weight: 1.0
  soft_category_boost: 0.005
  final_top_k: 10
  reranker_model: Alibaba-NLP/gte-reranker-modernbert-base
  reranker_batch_size: 4
  reranker_max_length: 512
  reranker_use_fp16: false
  reranker_providers:
    # Jina handles normal traffic. Each Voyage model has an independent,
    # deliberately conservative request budget for this account.
    order:
      - jina
      - voyage-2.5
      - voyage-2.5-lite
    timeout_seconds: 5
    # Reranking 60 full 1.5K-character documents consumed roughly 20K+ tokens
    # per search. The leading 800 characters retain the most useful labelled
    # title/category/description content while reducing API usage.
    max_document_chars: 800
    voyage_model: rerank-2.5
    voyage_lite_model: rerank-2.5-lite
    voyage_requests_per_minute_per_model: 3
    jina_model: jina-reranker-v2-base-multilingual

api:
  host: 127.0.0.1
  port: 8000
  # Local compatibility defaults to unauthenticated single-company mode.
  # Production must set API_AUTH_ENABLED=true and configure one API key per
  # company profile under configs/tenants/.
  auth_enabled: false
  rate_limit_enabled: true
  tenant_config_dir: configs/tenants
  # Conservative defaults for the one-company 8 GB test host. Production can
  # override these per deployment through .env after load testing.
  tenant_engine_cache_size: 1
  tenant_max_concurrent_searches: 2
  # Use debug for library-level diagnostics; info shows the search flow.
  log_level: info
  # Load the reranker once when the API process starts. Requests reuse the
  # same in-memory model and do not pay model-loading latency.
  preload_reranker: true
  # Normal product-grid and infinite-scroll batch size.
  default_page_size: 20
  max_page_size: 20
  preload_embedding: true
  # Combined cached window: 60 reranked results plus up to 140 related rows.
  max_results: 200
  session_ttl_seconds: 600
  max_sessions: 500
  usage_tracking_enabled: true
  usage_db_path: storage/usage.sqlite3
