services:
  api:
    build:
      context: .
    env_file:
      - path: .env
        required: true
      - path: .env.keys
        required: false
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      MYSQL_HOST: ${DOCKER_MYSQL_HOST:-host.docker.internal}
      PGVECTOR_HOST: pgvector
      PGVECTOR_PORT: 5432
      API_TENANT_ENGINE_CACHE_SIZE: ${API_TENANT_ENGINE_CACHE_SIZE:-1}
      API_TENANT_MAX_CONCURRENT_SEARCHES: ${API_TENANT_MAX_CONCURRENT_SEARCHES:-1}
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - ./storage:/app/storage
      - ./configs/tenants:/app/configs/tenants:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg16
    env_file:
      - path: .env
        required: true
      - path: .env.keys
        required: false
    environment:
      POSTGRES_DB: ${PGVECTOR_DATABASE:?set PGVECTOR_DATABASE}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${PGVECTOR_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 2500m
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    mem_limit: 1536m
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "3"
    restart: unless-stopped

volumes:
  redis-data:
  pgvector-data:
  ollama-data:
